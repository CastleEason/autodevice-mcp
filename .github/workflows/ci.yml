name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python 3.12 / Node 24
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
          - ubuntu-latest
    env:
      MOBILE_AUTO_MCP_PYTHON: python
      MOBILE_AUTO_MCP_CACHE_HOME: ${{ runner.temp }}/autodevice-mcp-cache
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install npm package
        run: npm ci
      - name: Install Python test tools
        run: python -m pip install --upgrade pip && python -m pip install --constraint runtime/constraints.txt -e ".[dev]"
      - name: Node package and installed-tarball tests
        run: npm test
      - name: Python contract and regression tests
        run: python -m pytest -q -m "not real_device"
      - name: Ruff
        run: python -m ruff check .
      - name: Bandit high-severity scan
        run: python -m bandit -r mobile_auto_mcp -q -lll
      - name: Compile Python sources
        run: python -m compileall -q mobile_auto_mcp
      - name: Require function responsibility docstrings
        shell: python
        run: |
          import ast
          from pathlib import Path

          missing = []
          for source in Path("mobile_auto_mcp").rglob("*.py"):
              tree = ast.parse(source.read_text(encoding="utf-8"), filename=str(source))
              for node in ast.walk(tree):
                  if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)) and not ast.get_docstring(node):
                      missing.append(f"{source}:{node.lineno}:{node.name}")
          if missing:
              raise SystemExit("Missing function docstrings:\n" + "\n".join(missing))
      - name: Audit npm tarball
        run: npm pack --dry-run
      - name: Audit npm dependencies
        run: npm audit --omit=dev
