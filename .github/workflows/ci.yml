name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  package:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip build ruff bandit
      - run: python -m pip install .
      - run: ruff check mobile_auto_mcp
      - run: bandit -q -ll -r mobile_auto_mcp
      - run: python -m compileall -q mobile_auto_mcp
      - name: Require function responsibility docstrings
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path
          missing = []
          for path in Path("mobile_auto_mcp").rglob("*.py"):
              tree = ast.parse(path.read_text(encoding="utf-8"), filename=str(path))
              for node in ast.walk(tree):
                  if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)) and not ast.get_docstring(node):
                      missing.append(f"{path}:{node.lineno}:{node.name}")
          if missing:
              raise SystemExit("Missing function docstrings:\n" + "\n".join(missing))
          PY
      - run: python -c "from mcp.server.fastmcp import FastMCP; from mobile_auto_mcp.mcp_tools import register_all_tools; m=FastMCP('ci'); register_all_tools(m); assert len(m._tool_manager.list_tools()) == 45"
      - run: python -m build
