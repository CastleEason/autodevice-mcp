name: Publish npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  publish:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Use a Trusted Publishing compatible npm CLI
        run: npm install --global npm@11.11.0
      - run: npm ci --ignore-scripts
      - name: Require tag to match package version
        run: node -e "const expected = 'refs/tags/v' + require('./package.json').version; if (process.env.GITHUB_REF !== expected) throw new Error('Expected ' + expected + ', received ' + process.env.GITHUB_REF)"
      - run: npm publish --provenance --access public
